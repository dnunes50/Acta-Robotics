<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ===================== SUPABASE =====================
const SUPABASE_URL = "https://sjuzirbvogqppqmdtbhp.supabase.co";
const SUPABASE_KEY = "sb_publishable_UkzdvIvFTCWLZ5vDXnY0Vw_CsoJhR-U";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================== VARIÁVEIS =====================
const SALDO_INICIAL = 6490.00;
let DATA=[], PENDING=[], CH={};
let MONTHS=[], BM={};
let AMES='all', CPG='dash', DESP_SEG='cat';

document.getElementById('hdate').textContent = 'Posição: '+new Date().toLocaleDateString('pt-BR');

// ===================== FUNÇÕES SUPABASE =====================
async function salvarNoSupabase(dados) {
  const payload = dados.map(t => ({
    date: t.date,
    nome: t.nome,
    desc: t.desc,
    tipo: t.tipo,
    valor: t.valor,
    saldo: t.saldo,
    sit: t.sit,
    cat: t.cat,
    cc: t.cc
  }));

  const { error } = await supabase.from('lancamentos').insert(payload);

  if (error) {
    console.error(error);
    alert('Erro ao salvar no banco');
  } else {
    console.log('Dados salvos!');
  }
}

async function carregarDoSupabase() {
  const { data, error } = await supabase
    .from('lancamentos')
    .select('*')
    .order('date', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  if (!data.length) return;

  DATA = data.map(t => ({
    ...t,
    date: new Date(t.date)
  }));

  montarBase();
}

// ===================== PROCESSAMENTO =====================
function montarBase(){
  BM={};

  DATA.forEach(t=>{
    const mk = `${t.date.getFullYear()}-${String(t.date.getMonth()+1).padStart(2,'0')}`;
    if(!BM[mk]) BM[mk]={txns:[],saldoFim:t.saldo,saldoIni:0,ent:0,sai:0};
    BM[mk].txns.push(t);
    BM[mk].saldoFim=t.saldo;
  });

  MONTHS = Object.keys(BM).sort();

  MONTHS.forEach((mk,i)=>{
    const m=BM[mk];
    m.saldoIni = i===0 ? SALDO_INICIAL : BM[MONTHS[i-1]].saldoFim;
    m.ent = m.txns.filter(t=>t.valor>0).reduce((s,t)=>s+t.valor,0);
    m.sai = m.txns.filter(t=>t.valor<0).reduce((s,t)=>s+t.valor,0);
  });

  AMES = MONTHS[MONTHS.length-1];
  refresh();
}

// ===================== IMPORTAÇÃO =====================
function confirmImp(){
  if(!PENDING.length) return;

  DATA = PENDING;

  // 🔥 salva no banco
  salvarNoSupabase(PENDING);

  montarBase();
}

// ===================== DASH =====================
function refresh(){
  renderDash();
}

function renderDash(){
  if(!DATA.length) return;

  const txns = DATA;
  const cur = txns[txns.length-1].saldo;

  document.getElementById('k-sal').textContent =
    'R$ ' + cur.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

// ===================== AUTO LOAD =====================
window.onload = () => {
  carregarDoSupabase();
};

</script>
